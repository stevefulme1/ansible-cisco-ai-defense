---
# Cisco AI Defense API connection
ai_defense_monitoring_api_url: "https://aidefense.cisco.com/api/v1"
ai_defense_monitoring_api_key: ""
ai_defense_monitoring_verify_ssl: true
ai_defense_monitoring_api_timeout: 30

# Organization
ai_defense_monitoring_organization_id: ""

# Splunk integration
ai_defense_monitoring_splunk_url: ""
ai_defense_monitoring_splunk_token: ""
ai_defense_monitoring_splunk_index: "ai_defense"
ai_defense_monitoring_splunk_source_type: "cisco:ai_defense"

# Alerting configuration
ai_defense_monitoring_alert_severity_threshold: "high"
ai_defense_monitoring_alert_channels:
  - email
ai_defense_monitoring_alert_email_recipients: []

# Dashboard
ai_defense_monitoring_dashboard_enabled: true

# Compliance monitoring
ai_defense_monitoring_compliance_frameworks:
  - eu_ai_act
  - nist_ai_rmf

# State
ai_defense_monitoring_state: present
