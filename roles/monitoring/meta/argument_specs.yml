---
argument_specs:
  main:
    short_description: Configure monitoring and alerting for Cisco AI Defense
    description:
      - Configures Splunk integration for log forwarding, sets up alerting
        rules based on severity thresholds, configures compliance monitoring
        for regulatory frameworks, and enables the monitoring dashboard.
    options:
      ai_defense_monitoring_api_url:
        description: Base URL for the Cisco AI Defense API.
        type: str
        default: "https://aidefense.cisco.com/api/v1"
      ai_defense_monitoring_api_key:
        description: API key for authenticating with Cisco AI Defense.
        type: str
        required: true
        no_log: true
      ai_defense_monitoring_verify_ssl:
        description: Whether to verify SSL certificates for API calls.
        type: bool
        default: true
      ai_defense_monitoring_organization_id:
        description: Cisco AI Defense organization identifier.
        type: str
        required: true
      ai_defense_monitoring_splunk_url:
        description: Splunk HEC URL for log forwarding.
        type: str
      ai_defense_monitoring_splunk_token:
        description: Splunk HEC authentication token.
        type: str
        no_log: true
      ai_defense_monitoring_splunk_index:
        description: Splunk index for AI Defense events.
        type: str
        default: ai_defense
      ai_defense_monitoring_splunk_source_type:
        description: Splunk source type for events.
        type: str
        default: "cisco:ai_defense"
      ai_defense_monitoring_alert_severity_threshold:
        description: Minimum severity level that triggers alerts.
        type: str
        default: high
        choices:
          - critical
          - high
          - medium
          - low
      ai_defense_monitoring_alert_channels:
        description: Alert notification channels.
        type: list
        elements: str
        default:
          - email
      ai_defense_monitoring_alert_email_recipients:
        description: Email addresses for alert notifications.
        type: list
        elements: str
        default: []
      ai_defense_monitoring_dashboard_enabled:
        description: Enable the monitoring dashboard.
        type: bool
        default: true
      ai_defense_monitoring_compliance_frameworks:
        description: Compliance frameworks to monitor.
        type: list
        elements: str
        default:
          - eu_ai_act
          - nist_ai_rmf
      ai_defense_monitoring_state:
        description: Desired state of the monitoring configuration.
        type: str
        default: present
        choices:
          - present
          - absent
