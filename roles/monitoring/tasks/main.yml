---
- name: Validate required parameters
  ansible.builtin.assert:
    that:
      - ai_defense_monitoring_api_key | length > 0
      - ai_defense_monitoring_organization_id | length > 0
      - ai_defense_monitoring_alert_severity_threshold in ai_defense_monitoring_valid_severities
    fail_msg: >-
      Missing required parameters. Ensure ai_defense_monitoring_api_key
      and ai_defense_monitoring_organization_id are defined.
    quiet: true

- name: Validate Splunk parameters when URL is provided
  ansible.builtin.assert:
    that:
      - ai_defense_monitoring_splunk_token | length > 0
    fail_msg: "Splunk token is required when Splunk URL is configured."
    quiet: true
  when: ai_defense_monitoring_splunk_url | length > 0

- name: Configure Splunk integration
  ansible.builtin.uri:
    url: "{{ ai_defense_monitoring_api_url }}/organizations/{{ ai_defense_monitoring_organization_id }}/integrations/splunk"
    method: PUT
    headers: "{{ ai_defense_monitoring_api_headers }}"
    body_format: json
    body:
      url: "{{ ai_defense_monitoring_splunk_url }}"
      token: "{{ ai_defense_monitoring_splunk_token }}"
      index: "{{ ai_defense_monitoring_splunk_index }}"
      source_type: "{{ ai_defense_monitoring_splunk_source_type }}"
      state: "{{ ai_defense_monitoring_state }}"
    validate_certs: "{{ ai_defense_monitoring_verify_ssl }}"
    timeout: "{{ ai_defense_monitoring_api_timeout }}"
    status_code: [200, 201]
  register: ai_defense_monitoring_splunk_result
  no_log: true
  when:
    - not ansible_check_mode
    - ai_defense_monitoring_splunk_url | length > 0

- name: Configure Splunk integration (check mode)
  ansible.builtin.debug:
    msg: "Would configure Splunk integration at {{ ai_defense_monitoring_splunk_url }}"
  when:
    - ansible_check_mode
    - ai_defense_monitoring_splunk_url | length > 0

- name: Set up alerting rules
  ansible.builtin.uri:
    url: "{{ ai_defense_monitoring_api_url }}/organizations/{{ ai_defense_monitoring_organization_id }}/monitoring/alerts"
    method: PUT
    headers: "{{ ai_defense_monitoring_api_headers }}"
    body_format: json
    body:
      severity_threshold: "{{ ai_defense_monitoring_alert_severity_threshold }}"
      channels: "{{ ai_defense_monitoring_alert_channels }}"
      email_recipients: "{{ ai_defense_monitoring_alert_email_recipients }}"
      state: "{{ ai_defense_monitoring_state }}"
    validate_certs: "{{ ai_defense_monitoring_verify_ssl }}"
    timeout: "{{ ai_defense_monitoring_api_timeout }}"
    status_code: [200, 201]
  when: not ansible_check_mode

- name: Set up alerting rules (check mode)
  ansible.builtin.debug:
    msg: >-
      Would configure alerting: severity >= {{ ai_defense_monitoring_alert_severity_threshold }},
      channels: {{ ai_defense_monitoring_alert_channels | join(', ') }}
  when: ansible_check_mode

- name: Configure compliance monitoring
  ansible.builtin.uri:
    url: "{{ ai_defense_monitoring_api_url }}/organizations/{{ ai_defense_monitoring_organization_id }}/monitoring/compliance"
    method: PUT
    headers: "{{ ai_defense_monitoring_api_headers }}"
    body_format: json
    body:
      frameworks: "{{ ai_defense_monitoring_compliance_frameworks }}"
      state: "{{ ai_defense_monitoring_state }}"
    validate_certs: "{{ ai_defense_monitoring_verify_ssl }}"
    timeout: "{{ ai_defense_monitoring_api_timeout }}"
    status_code: [200, 201]
  when:
    - not ansible_check_mode
    - ai_defense_monitoring_compliance_frameworks | length > 0

- name: Configure compliance monitoring (check mode)
  ansible.builtin.debug:
    msg: >-
      Would configure compliance monitoring for:
      {{ ai_defense_monitoring_compliance_frameworks | join(', ') }}
  when:
    - ansible_check_mode
    - ai_defense_monitoring_compliance_frameworks | length > 0

- name: Enable monitoring dashboard
  ansible.builtin.uri:
    url: "{{ ai_defense_monitoring_api_url }}/organizations/{{ ai_defense_monitoring_organization_id }}/monitoring/dashboard"
    method: PUT
    headers: "{{ ai_defense_monitoring_api_headers }}"
    body_format: json
    body:
      enabled: "{{ ai_defense_monitoring_dashboard_enabled }}"
    validate_certs: "{{ ai_defense_monitoring_verify_ssl }}"
    timeout: "{{ ai_defense_monitoring_api_timeout }}"
    status_code: [200, 201]
  when:
    - not ansible_check_mode
    - ai_defense_monitoring_dashboard_enabled

- name: Enable monitoring dashboard (check mode)
  ansible.builtin.debug:
    msg: "Would enable monitoring dashboard"
  when:
    - ansible_check_mode
    - ai_defense_monitoring_dashboard_enabled

- name: Verify integration health
  ansible.builtin.uri:
    url: "{{ ai_defense_monitoring_api_url }}/organizations/{{ ai_defense_monitoring_organization_id }}/monitoring/health"
    method: GET
    headers: "{{ ai_defense_monitoring_api_headers }}"
    validate_certs: "{{ ai_defense_monitoring_verify_ssl }}"
    timeout: "{{ ai_defense_monitoring_api_timeout }}"
    status_code: [200]
  register: ai_defense_monitoring_health
  check_mode: false
  changed_when: false
  when: not ansible_check_mode

- name: Report monitoring status
  ansible.builtin.debug:
    msg: >-
      Monitoring configuration {{ 'applied' if not ansible_check_mode else 'validated (check mode)' }}
      for organization {{ ai_defense_monitoring_organization_id }}.
