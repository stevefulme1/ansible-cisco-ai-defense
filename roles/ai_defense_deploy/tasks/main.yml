---
- name: Validate required parameters
  ansible.builtin.assert:
    that:
      - ai_defense_deploy_api_key | length > 0
      - ai_defense_deploy_api_url | length > 0
      - ai_defense_deploy_organization_id | length > 0
      - ai_defense_deploy_log_level in ai_defense_deploy_valid_log_levels
    fail_msg: >-
      Missing required parameters. Ensure ai_defense_deploy_api_key,
      ai_defense_deploy_api_url, and ai_defense_deploy_organization_id
      are defined.
    quiet: true

- name: Validate API connectivity
  ansible.builtin.uri:
    url: "{{ ai_defense_deploy_health_endpoint }}"
    method: GET
    headers: "{{ ai_defense_deploy_api_headers }}"
    validate_certs: "{{ ai_defense_deploy_verify_ssl }}"
    timeout: "{{ ai_defense_deploy_api_timeout }}"
    status_code: [200]
  register: ai_defense_deploy_health_result
  check_mode: false
  changed_when: false

- name: Display API version
  ansible.builtin.debug:
    msg: "Connected to AI Defense API version {{ ai_defense_deploy_health_result.json.version | default('unknown') }}"

- name: Register organization
  ansible.builtin.uri:
    url: "{{ ai_defense_deploy_org_endpoint }}/{{ ai_defense_deploy_organization_id }}"
    method: PUT
    headers: "{{ ai_defense_deploy_api_headers }}"
    body_format: json
    body:
      name: "{{ ai_defense_deploy_organization_name }}"
      state: "{{ ai_defense_deploy_state }}"
      log_level: "{{ ai_defense_deploy_log_level }}"
    validate_certs: "{{ ai_defense_deploy_verify_ssl }}"
    timeout: "{{ ai_defense_deploy_api_timeout }}"
    status_code: [200, 201]
  register: ai_defense_deploy_org_result
  when: not ansible_check_mode

- name: Register organization (check mode)
  ansible.builtin.debug:
    msg: "Would register organization {{ ai_defense_deploy_organization_id }}"
  when: ansible_check_mode

- name: Configure API credentials and permissions
  ansible.builtin.uri:
    url: "{{ ai_defense_deploy_credentials_endpoint }}"
    method: POST
    headers: "{{ ai_defense_deploy_api_headers }}"
    body_format: json
    body:
      organization_id: "{{ ai_defense_deploy_organization_id }}"
      permissions:
        - read_policies
        - write_policies
        - read_threats
        - manage_guardrails
        - view_compliance
    validate_certs: "{{ ai_defense_deploy_verify_ssl }}"
    timeout: "{{ ai_defense_deploy_api_timeout }}"
    status_code: [200, 201]
  register: ai_defense_deploy_creds_result
  when: not ansible_check_mode

- name: Configure API credentials (check mode)
  ansible.builtin.debug:
    msg: "Would configure API credentials for organization {{ ai_defense_deploy_organization_id }}"
  when: ansible_check_mode

- name: Set up webhook endpoints
  ansible.builtin.uri:
    url: "{{ ai_defense_deploy_webhook_endpoint }}"
    method: POST
    headers: "{{ ai_defense_deploy_api_headers }}"
    body_format: json
    body:
      organization_id: "{{ ai_defense_deploy_organization_id }}"
      url: "{{ ai_defense_deploy_webhook_url }}"
      secret: "{{ ai_defense_deploy_webhook_secret }}"
      events: "{{ ai_defense_deploy_webhook_events }}"
      state: active
    validate_certs: "{{ ai_defense_deploy_verify_ssl }}"
    timeout: "{{ ai_defense_deploy_api_timeout }}"
    status_code: [200, 201]
  register: ai_defense_deploy_webhook_result
  when:
    - not ansible_check_mode
    - ai_defense_deploy_webhook_url | length > 0

- name: Set up webhook endpoints (check mode)
  ansible.builtin.debug:
    msg: "Would configure webhook at {{ ai_defense_deploy_webhook_url }}"
  when:
    - ansible_check_mode
    - ai_defense_deploy_webhook_url | length > 0

- name: Verify deployment health
  ansible.builtin.uri:
    url: "{{ ai_defense_deploy_health_endpoint }}"
    method: GET
    headers: "{{ ai_defense_deploy_api_headers }}"
    validate_certs: "{{ ai_defense_deploy_verify_ssl }}"
    timeout: "{{ ai_defense_deploy_api_timeout }}"
    status_code: [200]
  register: ai_defense_deploy_final_health
  until: ai_defense_deploy_final_health.status == 200
  retries: "{{ ai_defense_deploy_health_check_retries }}"
  delay: "{{ ai_defense_deploy_health_check_delay }}"
  check_mode: false
  changed_when: false
  when: not ansible_check_mode

- name: Report deployment status
  ansible.builtin.debug:
    msg: >-
      Cisco AI Defense deployment {{ 'verified' if not ansible_check_mode else 'validated (check mode)' }}
      for organization {{ ai_defense_deploy_organization_id }}.
