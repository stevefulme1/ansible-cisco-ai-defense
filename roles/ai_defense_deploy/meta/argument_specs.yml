---
argument_specs:
  main:
    short_description: Deploy and configure Cisco AI Defense platform
    description:
      - Validates API connectivity, registers the organization, configures
        credentials and permissions, sets up webhook endpoints, and verifies
        deployment health.
    options:
      ai_defense_deploy_api_url:
        description: Base URL for the Cisco AI Defense API.
        type: str
        default: "https://aidefense.cisco.com/api/v1"
      ai_defense_deploy_api_key:
        description: API key for authenticating with Cisco AI Defense.
        type: str
        required: true
        no_log: true
      ai_defense_deploy_verify_ssl:
        description: Whether to verify SSL certificates for API calls.
        type: bool
        default: true
      ai_defense_deploy_organization_id:
        description: Cisco AI Defense organization identifier.
        type: str
        required: true
      ai_defense_deploy_organization_name:
        description: Human-readable name for the organization.
        type: str
      ai_defense_deploy_webhook_url:
        description: URL to receive event webhook notifications.
        type: str
      ai_defense_deploy_webhook_secret:
        description: Shared secret for webhook signature verification.
        type: str
        no_log: true
      ai_defense_deploy_webhook_events:
        description: List of event types to subscribe to via webhook.
        type: list
        elements: str
        default:
          - threat_detected
          - policy_violation
          - compliance_alert
      ai_defense_deploy_log_level:
        description: Logging level for the deployment.
        type: str
        default: info
        choices:
          - debug
          - info
          - warning
          - error
      ai_defense_deploy_state:
        description: Desired state of the deployment.
        type: str
        default: present
        choices:
          - present
          - absent
      ai_defense_deploy_api_timeout:
        description: Timeout in seconds for API requests.
        type: int
        default: 30
      ai_defense_deploy_health_check_retries:
        description: Number of retries for health check verification.
        type: int
        default: 5
      ai_defense_deploy_health_check_delay:
        description: Delay in seconds between health check retries.
        type: int
        default: 10
