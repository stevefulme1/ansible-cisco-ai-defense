---
argument_specs:
  main:
    short_description: Automated red-team validation workflow
    description:
      - Configures and executes automated red-team validation against
        AI model endpoints. Tests for prompt injection, jailbreak,
        PII leakage, and other attack categories. Evaluates results
        against a configurable pass threshold.
    options:
      ai_defense_redteam_api_url:
        description: Base URL for the Cisco AI Defense API.
        type: str
        default: "https://aidefense.cisco.com/api/v1"
      ai_defense_redteam_api_key:
        description: API key for authenticating with Cisco AI Defense.
        type: str
        required: true
        no_log: true
      ai_defense_redteam_verify_ssl:
        description: Whether to verify SSL certificates for API calls.
        type: bool
        default: true
      ai_defense_redteam_organization_id:
        description: Cisco AI Defense organization identifier.
        type: str
        required: true
      ai_defense_redteam_model_endpoint:
        description: URL of the AI model endpoint to validate.
        type: str
        required: true
      ai_defense_redteam_categories:
        description: List of attack categories to test.
        type: list
        elements: str
        default:
          - prompt_injection
          - jailbreak
          - pii_leakage
          - hallucination
          - toxicity
          - bias
      ai_defense_redteam_pass_threshold:
        description: Minimum score (0.0-1.0) required to pass validation.
        type: float
        default: 0.8
      ai_defense_redteam_fail_on_threshold:
        description: Fail the play if the score is below the threshold.
        type: bool
        default: true
      ai_defense_redteam_report_format:
        description: Format for the validation report.
        type: str
        default: json
        choices:
          - json
          - html
          - csv
      ai_defense_redteam_poll_interval:
        description: Seconds between status polls during validation.
        type: int
        default: 30
      ai_defense_redteam_poll_timeout:
        description: Maximum seconds to wait for validation to complete.
        type: int
        default: 600
