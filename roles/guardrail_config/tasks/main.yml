---
- name: Validate required parameters
  ansible.builtin.assert:
    that:
      - guardrail_config_api_key | length > 0
      - guardrail_config_api_url | length > 0
      - guardrail_config_organization_id | length > 0
    fail_msg: >-
      Missing required parameters. Ensure guardrail_config_api_key,
      guardrail_config_api_url, and guardrail_config_organization_id
      are defined.
    quiet: true

- name: Apply guardrail policies
  ansible.builtin.uri:
    url: "{{ guardrail_config_api_url }}/organizations/{{ guardrail_config_organization_id }}/guardrails"
    method: PUT
    headers: "{{ guardrail_config_api_headers }}"
    body_format: json
    body:
      name: "{{ item.name }}"
      type: "{{ item.type | default('input') }}"
      enabled: "{{ item.enabled | default(true) }}"
      actions: "{{ item.actions | default(['log']) }}"
    validate_certs: "{{ guardrail_config_verify_ssl }}"
    timeout: "{{ guardrail_config_api_timeout }}"
    status_code: [200, 201]
  loop: "{{ guardrail_config_policies }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - not ansible_check_mode
    - guardrail_config_policies | length > 0

- name: Apply guardrail policies (check mode)
  ansible.builtin.debug:
    msg: "Would apply guardrail policy: {{ item.name }}"
  loop: "{{ guardrail_config_policies }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - ansible_check_mode
    - guardrail_config_policies | length > 0

- name: Configure PII detection rules
  ansible.builtin.uri:
    url: "{{ guardrail_config_api_url }}/organizations/{{ guardrail_config_organization_id }}/guardrails/pii"
    method: PUT
    headers: "{{ guardrail_config_api_headers }}"
    body_format: json
    body:
      enabled: "{{ guardrail_config_pii_detection_enabled }}"
      entity_types: "{{ guardrail_config_pii_entity_types }}"
      action: "{{ guardrail_config_pii_action }}"
    validate_certs: "{{ guardrail_config_verify_ssl }}"
    timeout: "{{ guardrail_config_api_timeout }}"
    status_code: [200, 201]
  when: not ansible_check_mode

- name: Configure PII detection rules (check mode)
  ansible.builtin.debug:
    msg: >-
      Would configure PII detection: enabled={{ guardrail_config_pii_detection_enabled }},
      entity_types={{ guardrail_config_pii_entity_types | join(', ') }}
  when: ansible_check_mode

- name: Set up topic boundaries
  ansible.builtin.uri:
    url: "{{ guardrail_config_api_url }}/organizations/{{ guardrail_config_organization_id }}/guardrails/topics"
    method: PUT
    headers: "{{ guardrail_config_api_headers }}"
    body_format: json
    body:
      enabled: "{{ guardrail_config_topic_boundaries_enabled }}"
      allowed_topics: "{{ guardrail_config_allowed_topics }}"
      blocked_topics: "{{ guardrail_config_blocked_topics }}"
    validate_certs: "{{ guardrail_config_verify_ssl }}"
    timeout: "{{ guardrail_config_api_timeout }}"
    status_code: [200, 201]
  when:
    - not ansible_check_mode
    - guardrail_config_topic_boundaries_enabled

- name: Set up topic boundaries (check mode)
  ansible.builtin.debug:
    msg: >-
      Would configure topic boundaries:
      allowed={{ guardrail_config_allowed_topics | length }},
      blocked={{ guardrail_config_blocked_topics | length }}
  when:
    - ansible_check_mode
    - guardrail_config_topic_boundaries_enabled

- name: Configure content filters
  ansible.builtin.uri:
    url: "{{ guardrail_config_api_url }}/organizations/{{ guardrail_config_organization_id }}/guardrails/content-filters"
    method: PUT
    headers: "{{ guardrail_config_api_headers }}"
    body_format: json
    body:
      enabled: "{{ guardrail_config_content_filters_enabled }}"
      categories: "{{ guardrail_config_content_filter_categories }}"
    validate_certs: "{{ guardrail_config_verify_ssl }}"
    timeout: "{{ guardrail_config_api_timeout }}"
    status_code: [200, 201]
  when:
    - not ansible_check_mode
    - guardrail_config_content_filters_enabled

- name: Configure content filters (check mode)
  ansible.builtin.debug:
    msg: >-
      Would configure {{ guardrail_config_content_filter_categories | length }} content filter categories
  when:
    - ansible_check_mode
    - guardrail_config_content_filters_enabled

- name: Apply rate limiting policies
  ansible.builtin.uri:
    url: "{{ guardrail_config_api_url }}/organizations/{{ guardrail_config_organization_id }}/guardrails/rate-limits"
    method: PUT
    headers: "{{ guardrail_config_api_headers }}"
    body_format: json
    body:
      enabled: "{{ guardrail_config_rate_limiting_enabled }}"
      requests_per_minute: "{{ guardrail_config_rate_limit_requests_per_minute }}"
      tokens_per_minute: "{{ guardrail_config_rate_limit_tokens_per_minute }}"
    validate_certs: "{{ guardrail_config_verify_ssl }}"
    timeout: "{{ guardrail_config_api_timeout }}"
    status_code: [200, 201]
  when:
    - not ansible_check_mode
    - guardrail_config_rate_limiting_enabled

- name: Apply rate limiting policies (check mode)
  ansible.builtin.debug:
    msg: >-
      Would configure rate limits:
      {{ guardrail_config_rate_limit_requests_per_minute }} req/min,
      {{ guardrail_config_rate_limit_tokens_per_minute }} tokens/min
  when:
    - ansible_check_mode
    - guardrail_config_rate_limiting_enabled

- name: Validate applied configuration
  ansible.builtin.uri:
    url: "{{ guardrail_config_api_url }}/organizations/{{ guardrail_config_organization_id }}/guardrails"
    method: GET
    headers: "{{ guardrail_config_api_headers }}"
    validate_certs: "{{ guardrail_config_verify_ssl }}"
    timeout: "{{ guardrail_config_api_timeout }}"
    status_code: [200]
  register: guardrail_config_validation_result
  check_mode: false
  changed_when: false
  when: not ansible_check_mode

- name: Report guardrail configuration status
  ansible.builtin.debug:
    msg: >-
      Guardrail configuration {{ 'applied' if not ansible_check_mode else 'validated (check mode)' }}
      for organization {{ guardrail_config_organization_id }}.
