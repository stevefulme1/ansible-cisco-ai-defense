---
argument_specs:
  main:
    short_description: Apply baseline guardrail policies for common AI use cases
    description:
      - Applies preset-specific guardrail policies, configures PII detection,
        enables prompt injection defense, and sets rate limits based on the
        selected use case preset.
    options:
      ai_defense_baseline_api_url:
        description: Base URL for the Cisco AI Defense API.
        type: str
        default: "https://aidefense.cisco.com/api/v1"
      ai_defense_baseline_api_key:
        description: API key for authenticating with Cisco AI Defense.
        type: str
        required: true
        no_log: true
      ai_defense_baseline_verify_ssl:
        description: Whether to verify SSL certificates for API calls.
        type: bool
        default: true
      ai_defense_baseline_organization_id:
        description: Cisco AI Defense organization identifier.
        type: str
        required: true
      ai_defense_baseline_preset:
        description: Baseline policy preset for the AI use case.
        type: str
        default: chatbot
        choices:
          - chatbot
          - code_generation
          - document_analysis
          - customer_service
      ai_defense_baseline_pii_detection:
        description: Enable PII detection with preset-appropriate entity types.
        type: bool
        default: true
      ai_defense_baseline_prompt_injection_defense:
        description: Enable prompt injection defense.
        type: bool
        default: true
      ai_defense_baseline_rate_limiting:
        description: Enable rate limiting.
        type: bool
        default: true
      ai_defense_baseline_rate_limit_rpm:
        description: Maximum requests per minute.
        type: int
        default: 60
      ai_defense_baseline_rate_limit_tpm:
        description: Maximum tokens per minute.
        type: int
        default: 100000
      ai_defense_baseline_state:
        description: Desired state of the baseline policy.
        type: str
        default: present
        choices:
          - present
          - absent
