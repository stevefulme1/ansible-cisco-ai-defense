---
- name: Validate required parameters
  ansible.builtin.assert:
    that:
      - ai_defense_supply_chain_api_key | length > 0
      - ai_defense_supply_chain_organization_id | length > 0
      - ai_defense_supply_chain_model_reference | length > 0
      - ai_defense_supply_chain_risk_threshold in ai_defense_supply_chain_valid_thresholds
    fail_msg: >-
      Missing required parameters. Ensure ai_defense_supply_chain_api_key,
      ai_defense_supply_chain_organization_id, and
      ai_defense_supply_chain_model_reference are defined.
    quiet: true

- name: Scan model files for vulnerabilities
  ansible.builtin.uri:
    url: "{{ ai_defense_supply_chain_api_url }}/organizations/{{ ai_defense_supply_chain_organization_id }}/supply-chain/scan/model"
    method: POST
    headers: "{{ ai_defense_supply_chain_api_headers }}"
    body_format: json
    body:
      model_reference: "{{ ai_defense_supply_chain_model_reference }}"
      scan_type: model_files
    validate_certs: "{{ ai_defense_supply_chain_verify_ssl }}"
    timeout: "{{ ai_defense_supply_chain_api_timeout }}"
    status_code: [200, 202]
  register: ai_defense_supply_chain_model_scan
  when: not ansible_check_mode

- name: Scan model files (check mode)
  ansible.builtin.debug:
    msg: "Would scan model files for {{ ai_defense_supply_chain_model_reference }}"
  when: ansible_check_mode

- name: Scan container images
  ansible.builtin.uri:
    url: "{{ ai_defense_supply_chain_api_url }}/organizations/{{ ai_defense_supply_chain_organization_id }}/supply-chain/scan/container"
    method: POST
    headers: "{{ ai_defense_supply_chain_api_headers }}"
    body_format: json
    body:
      model_reference: "{{ ai_defense_supply_chain_model_reference }}"
      container_image: "{{ item }}"
    validate_certs: "{{ ai_defense_supply_chain_verify_ssl }}"
    timeout: "{{ ai_defense_supply_chain_api_timeout }}"
    status_code: [200, 202]
  loop: "{{ ai_defense_supply_chain_container_images }}"
  register: ai_defense_supply_chain_container_scans
  when:
    - not ansible_check_mode
    - ai_defense_supply_chain_scan_containers
    - ai_defense_supply_chain_container_images | length > 0

- name: Scan container images (check mode)
  ansible.builtin.debug:
    msg: "Would scan container image: {{ item }}"
  loop: "{{ ai_defense_supply_chain_container_images }}"
  when:
    - ansible_check_mode
    - ai_defense_supply_chain_scan_containers
    - ai_defense_supply_chain_container_images | length > 0

- name: Verify model provenance
  ansible.builtin.uri:
    url: "{{ ai_defense_supply_chain_api_url }}/organizations/{{ ai_defense_supply_chain_organization_id }}/supply-chain/provenance"
    method: POST
    headers: "{{ ai_defense_supply_chain_api_headers }}"
    body_format: json
    body:
      model_reference: "{{ ai_defense_supply_chain_model_reference }}"
    validate_certs: "{{ ai_defense_supply_chain_verify_ssl }}"
    timeout: "{{ ai_defense_supply_chain_api_timeout }}"
    status_code: [200, 202]
  register: ai_defense_supply_chain_provenance
  when:
    - not ansible_check_mode
    - ai_defense_supply_chain_verify_provenance

- name: Verify model provenance (check mode)
  ansible.builtin.debug:
    msg: "Would verify provenance for {{ ai_defense_supply_chain_model_reference }}"
  when:
    - ansible_check_mode
    - ai_defense_supply_chain_verify_provenance

- name: Wait for model scan to complete
  ansible.builtin.uri:
    url: >-
      {{ ai_defense_supply_chain_api_url }}/organizations/{{
      ai_defense_supply_chain_organization_id }}/supply-chain/scans/{{
      ai_defense_supply_chain_model_scan.json.scan_id }}/status
    method: GET
    headers: "{{ ai_defense_supply_chain_api_headers }}"
    validate_certs: "{{ ai_defense_supply_chain_verify_ssl }}"
    timeout: "{{ ai_defense_supply_chain_api_timeout }}"
    status_code: [200]
  register: ai_defense_supply_chain_scan_status
  until: ai_defense_supply_chain_scan_status.json.status in ['completed', 'failed']
  retries: "{{ (ai_defense_supply_chain_poll_timeout / ai_defense_supply_chain_poll_interval) | int }}"
  delay: "{{ ai_defense_supply_chain_poll_interval }}"
  when: not ansible_check_mode

- name: Generate SBOM report
  ansible.builtin.uri:
    url: "{{ ai_defense_supply_chain_api_url }}/organizations/{{ ai_defense_supply_chain_organization_id }}/supply-chain/sbom"
    method: POST
    headers: "{{ ai_defense_supply_chain_api_headers }}"
    body_format: json
    body:
      model_reference: "{{ ai_defense_supply_chain_model_reference }}"
      scan_id: "{{ ai_defense_supply_chain_model_scan.json.scan_id }}"
      format: spdx
    validate_certs: "{{ ai_defense_supply_chain_verify_ssl }}"
    timeout: "{{ ai_defense_supply_chain_api_timeout }}"
    status_code: [200, 201]
  register: ai_defense_supply_chain_sbom
  when:
    - not ansible_check_mode
    - ai_defense_supply_chain_generate_sbom

- name: Generate SBOM report (check mode)
  ansible.builtin.debug:
    msg: "Would generate SBOM report for {{ ai_defense_supply_chain_model_reference }}"
  when:
    - ansible_check_mode
    - ai_defense_supply_chain_generate_sbom

- name: Evaluate risk level
  ansible.builtin.assert:
    that:
      - >-
        ai_defense_supply_chain_risk_levels[ai_defense_supply_chain_scan_status.json.risk_level | default('low')]
        <= ai_defense_supply_chain_risk_levels[ai_defense_supply_chain_risk_threshold]
    fail_msg: >-
      Supply chain scan FAILED. Risk level
      '{{ ai_defense_supply_chain_scan_status.json.risk_level | default("unknown") }}'
      exceeds threshold '{{ ai_defense_supply_chain_risk_threshold }}'.
    success_msg: >-
      Supply chain scan PASSED. Risk level
      '{{ ai_defense_supply_chain_scan_status.json.risk_level | default("unknown") }}'
      is within threshold '{{ ai_defense_supply_chain_risk_threshold }}'.
  when:
    - not ansible_check_mode
    - ai_defense_supply_chain_fail_on_risk
