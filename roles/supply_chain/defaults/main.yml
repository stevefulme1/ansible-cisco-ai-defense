---
# Cisco AI Defense API connection
ai_defense_supply_chain_api_url: "https://aidefense.cisco.com/api/v1"
ai_defense_supply_chain_api_key: ""
ai_defense_supply_chain_verify_ssl: true
ai_defense_supply_chain_api_timeout: 60

# Organization
ai_defense_supply_chain_organization_id: ""

# Model reference for scanning
ai_defense_supply_chain_model_reference: ""

# Scan options
ai_defense_supply_chain_scan_containers: true
ai_defense_supply_chain_verify_provenance: true
ai_defense_supply_chain_generate_sbom: true

# Container scanning
ai_defense_supply_chain_container_images: []
#   - registry.example.com/ml-model:latest

# Risk evaluation
ai_defense_supply_chain_risk_threshold: "medium"
ai_defense_supply_chain_fail_on_risk: true

# Polling settings for async scans
ai_defense_supply_chain_poll_interval: 15
ai_defense_supply_chain_poll_timeout: 300
