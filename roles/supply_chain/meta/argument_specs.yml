---
argument_specs:
  main:
    short_description: Supply chain scanning pipeline for AI models in CI/CD
    description:
      - Scans AI model files and container images for vulnerabilities,
        verifies model provenance, generates SBOM reports, and evaluates
        risk against a configurable threshold for CI/CD gate checks.
    options:
      ai_defense_supply_chain_api_url:
        description: Base URL for the Cisco AI Defense API.
        type: str
        default: "https://aidefense.cisco.com/api/v1"
      ai_defense_supply_chain_api_key:
        description: API key for authenticating with Cisco AI Defense.
        type: str
        required: true
        no_log: true
      ai_defense_supply_chain_verify_ssl:
        description: Whether to verify SSL certificates for API calls.
        type: bool
        default: true
      ai_defense_supply_chain_organization_id:
        description: Cisco AI Defense organization identifier.
        type: str
        required: true
      ai_defense_supply_chain_model_reference:
        description: Model reference identifier or URI to scan.
        type: str
        required: true
      ai_defense_supply_chain_scan_containers:
        description: Scan container images for vulnerabilities.
        type: bool
        default: true
      ai_defense_supply_chain_container_images:
        description: List of container image references to scan.
        type: list
        elements: str
        default: []
      ai_defense_supply_chain_verify_provenance:
        description: Verify model provenance and lineage.
        type: bool
        default: true
      ai_defense_supply_chain_generate_sbom:
        description: Generate an SBOM report for the model.
        type: bool
        default: true
      ai_defense_supply_chain_risk_threshold:
        description: Maximum acceptable risk level.
        type: str
        default: medium
        choices:
          - critical
          - high
          - medium
          - low
      ai_defense_supply_chain_fail_on_risk:
        description: Fail the play if risk exceeds threshold.
        type: bool
        default: true
      ai_defense_supply_chain_poll_interval:
        description: Seconds between scan status polls.
        type: int
        default: 15
      ai_defense_supply_chain_poll_timeout:
        description: Maximum seconds to wait for scan completion.
        type: int
        default: 300
