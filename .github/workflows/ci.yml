---
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  NAMESPACE: stevefulme1
  COLLECTION: cisco_ai_defense

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}/requirements-dev.txt

      - name: Install dependencies
        run: pip install ansible-core>=2.16 ansible-lint yamllint flake8

      - name: Run yamllint
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
        run: yamllint -c .yamllint .

      - name: Run flake8
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
        run: flake8 plugins/ extensions/ --max-line-length=160 --select=E,F,W --ignore=E402,W503

      - name: Run ansible-lint
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
        run: ansible-lint --strict

  sanity:
    name: Sanity (Ansible ${{ matrix.ansible }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        ansible:
          - "2.16"
          - "2.17"
          - "2.18"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}/requirements-dev.txt

      - name: Install ansible-core ${{ matrix.ansible }}
        run: pip install "ansible-core~=${{ matrix.ansible }}.0"

      - name: Run sanity tests
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
        run: >-
          ansible-test sanity
          --docker default
          --color yes
          -v

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}/requirements-dev.txt

      - name: Install dependencies
        run: pip install ansible-core>=2.16 requests pytest pytest-cov

      - name: Run unit tests
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: >-
          pytest tests/unit/
          -v
          --tb=short
          --cov=plugins

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [sanity, unit]
    if: >-
      github.event_name != 'pull_request' ||
      !contains(github.event.pull_request.labels.*.name, 'skip ci')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}/requirements-dev.txt

      - name: Install dependencies
        run: pip install ansible-core>=2.16 requests

      - name: Run integration tests
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
        run: >-
          ansible-test integration
          --docker default
          --color yes
          -v
